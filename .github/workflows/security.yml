name: Security Scan (reusable)
on:
  workflow_call:
    inputs:
      docker-images:
        type: string
        default: '[]'
      gitleaks-only:
        type: boolean
        default: false
jobs:
  osv-scan:
    if: ${{ !inputs.gitleaks-only }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "osv"
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - run: echo "secrets"
  docker-scan:
    if: ${{ inputs.docker-images != '[]' && github.event_name != 'pull_request' }}
    name: Grype (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(inputs.docker-images) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image.name }}:${{ github.sha }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
      - run: echo "scan ${{ matrix.image.name }}"
