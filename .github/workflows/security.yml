name: Security Scan (reusable)

# Reusable security workflow for Skylabs Digital repos.
# See README.md for usage and templates.
#
# Note: no `permissions:` block — permissions are inherited from the caller.
# Callers typically set `permissions: contents: read` at workflow level.

on:
  workflow_call:
    inputs:
      docker-images:
        description: 'JSON array of images to scan with Grype'
        type: string
        default: '[]'
      gitleaks-only:
        description: 'Skip OSV-Scanner (for non-Node repos)'
        type: boolean
        default: false
      osv-scan-args:
        description: 'Override OSV-Scanner scan targets'
        type: string
        default: |-
          --recursive
          ./
      osv-fail-on-severity:
        description: 'Minimum severity (critical|high|medium|low) at which a FIXABLE OSV finding blocks the pipeline. Findings with no available fix, or below this severity, are reported as warnings only (non-blocking). Default: high — parity with Grype --fail-on high.'
        type: string
        default: high
      grype-fail-on-severity:
        description: 'Minimum severity (critical|high|medium|low) at which a FIXABLE container finding blocks the pipeline. Unfixed CVEs, or fixable findings below this severity, are reported as warnings only (non-blocking). Default: high.'
        type: string
        default: high
    secrets:
      npm-token:
        description: '[DEPRECATED — prefer app-id + private-key] Static token for private @skylabs-digital npm packages, injected as --mount=type=secret,id=npm_token during Docker builds.'
        required: false
      app-id:
        description: 'GitHub App ID (e.g. semantic-release-bot-skylabs). If provided together with private-key, the workflow generates an ephemeral installation token and uses it as npm_token for Docker builds. Takes precedence over npm-token.'
        required: false
      private-key:
        description: 'GitHub App private key matching app-id.'
        required: false

jobs:
  osv-scan:
    if: ${{ !inputs.gitleaks-only }}
    name: OSV-Scanner (deps)
    runs-on: [self-hosted, linux, x64, skylabs]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.0

      # OSV-Scanner has no native "--only-fixed" (unlike Grype), so run it
      # non-blocking with JSON output and let the gate step below decide.
      # continue-on-error: the scanner exits 1 when it finds vulns; we don't
      # want that exit to fail the job — the policy in the next step does.
      - name: Run OSV-Scanner (JSON, non-blocking)
        id: osv
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5  # v2.3.5
        with:
          scan-args: |-
            --format=json
            --output=osv-results.json
            ${{ inputs.osv-scan-args }}

      # Policy gate (parity with Grype --fail-on high --only-fixed):
      #   BLOCK  iff a finding is fixable (a patched version exists) AND its
      #          severity >= osv-fail-on-severity.
      #   WARN   for everything else — no fix available yet, or below threshold.
      # Nothing is silently dropped: all findings are listed in the job summary.
      - name: Gate on fixable findings
        env:
          FAIL_ON: ${{ inputs.osv-fail-on-severity }}
          OSV_OUTCOME: ${{ steps.osv.outcome }}
        run: |
          set -euo pipefail
          cat > /tmp/osv-gate.cjs <<'GATE'
          const fs = require('fs');
          const FAIL_ON = (process.env.FAIL_ON || 'high').toLowerCase();
          const RANK = { critical: 4, high: 3, medium: 2, moderate: 2, low: 1, unknown: 0 };
          const threshold = RANK[FAIL_ON] ?? 3;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const append = (s) => { if (summaryPath) fs.appendFileSync(summaryPath, s + '\n'); console.log(s); };

          if (!fs.existsSync('osv-results.json')) {
            // Scanner produced no file. Distinguish "clean" (exit 0) from a real error.
            if (process.env.OSV_OUTCOME === 'success') {
              append(`## OSV-Scanner\n\nNo vulnerabilities found.`);
            } else {
              const msg = 'OSV-Scanner produced no results file (scan may have errored) — not blocking.';
              console.log(`::warning title=OSV-Scanner::${msg}`);
              append(`## OSV-Scanner\n\n${msg}`);
            }
            process.exit(0);
          }

          let data;
          try { data = JSON.parse(fs.readFileSync('osv-results.json', 'utf8')); }
          catch (e) { console.log(`::warning title=OSV-Scanner::Could not parse results (${e.message}) — not blocking.`); process.exit(0); }

          const scoreToRank = (s) => s >= 9 ? 4 : s >= 7 ? 3 : s >= 4 ? 2 : s > 0 ? 1 : 0;
          const rankToLabel = { 4: 'critical', 3: 'high', 2: 'medium', 1: 'low', 0: 'unknown' };
          const blocking = [], warnings = [];

          for (const res of data.results || []) {
            const source = res.source && res.source.path ? res.source.path : '';
            for (const pkg of res.packages || []) {
              const p = pkg.package || {};
              // id -> CVSS score from groups[].max_severity (most reliable numeric severity)
              const cvss = new Map();
              for (const g of pkg.groups || []) {
                const sc = parseFloat(g.max_severity);
                if (!Number.isNaN(sc)) for (const id of g.ids || []) cvss.set(id, sc);
              }
              for (const v of pkg.vulnerabilities || []) {
                const fixable = (v.affected || []).some(a =>
                  (a.ranges || []).some(r => (r.events || []).some(e => 'fixed' in e)));
                let rank;
                if (cvss.has(v.id)) rank = scoreToRank(cvss.get(v.id));
                else rank = RANK[((v.database_specific && v.database_specific.severity) || '').toLowerCase()] ?? 0;
                const rec = { id: v.id, pkg: `${p.name}@${p.version}`, sev: rankToLabel[rank], source, fixable };
                (fixable && rank >= threshold ? blocking : warnings).push(rec);
              }
            }
          }

          const dedupe = (arr) => { const m = new Map(); for (const r of arr) m.set(`${r.id}|${r.pkg}`, r); return [...m.values()]; };
          const B = dedupe(blocking), W = dedupe(warnings);
          const table = (rows) => rows.length
            ? ['| ID | Package | Severity | Fix |', '|---|---|---|---|',
               ...rows.map(r => `| ${r.id} | ${r.pkg} | ${r.sev} | ${r.fixable ? 'available' : 'none yet'} |`)].join('\n')
            : '_none_';

          append(`## OSV-Scanner — dependency vulnerabilities`);
          append(`Policy: block on **fixable** findings of severity **${FAIL_ON}+**; no-fix-yet and below-threshold are warnings.\n`);
          append(`- 🚫 Blocking (fixable, ≥ ${FAIL_ON}): **${B.length}**`);
          append(`- ⚠️ Warnings (no fix yet, or below threshold): **${W.length}**\n`);
          if (B.length) { append(`### 🚫 Blocking`); append(table(B) + '\n'); }
          append(`### ⚠️ Warnings`); append(table(W) + '\n');

          for (const r of W) console.log(`::warning title=OSV ${r.id} (${r.sev}, ${r.fixable ? 'fix available, below threshold' : 'no fix yet'})::${r.pkg} in ${r.source}`);
          for (const r of B) console.log(`::error title=OSV ${r.id} (${r.sev}, fix available)::${r.pkg} in ${r.source} — upgrade to a patched version`);

          if (B.length) { console.error(`\nBlocking: ${B.length} fixable ${FAIL_ON}+ vuln(s).`); process.exit(1); }
          console.log(`\nNo blocking findings. ${W.length} warning(s) reported (non-blocking).`);
          GATE
          node /tmp/osv-gate.cjs

  secrets-scan:
    name: Gitleaks (secrets in code + history)
    runs-on: [self-hosted, linux, x64, skylabs]
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.0
        with:
          fetch-depth: 0

      - name: Install Gitleaks v8.30.1
        run: |
          set -euo pipefail
          VERSION=8.30.1
          case "$(uname -m)" in
            x86_64)
              ASSET=gitleaks_${VERSION}_linux_x64.tar.gz
              SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
              ;;
            aarch64|arm64)
              ASSET=gitleaks_${VERSION}_linux_arm64.tar.gz
              SHA256=e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080
              ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ASSET}" -o gitleaks.tgz
          echo "${SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Full-history secret scan. A leaked secret stays leaked, so we keep
      # exit-code 1 on real findings — but allow callers to suppress confirmed
      # false positives so the gate doesn't cry wolf:
      #   - .gitleaks.toml   (regex/path/stopword allowlist) — threaded via -c
      #   - .gitleaksignore  (per-finding fingerprints)       — auto-loaded by gitleaks
      - name: Scan repository (full history)
        run: |
          set -euo pipefail
          CONFIG_FLAG=""
          if [ -f .gitleaks.toml ]; then
            echo "Using .gitleaks.toml allowlist from calling repo"
            CONFIG_FLAG="-c .gitleaks.toml"
          fi
          gitleaks detect --source . $CONFIG_FLAG --redact --exit-code 1 --verbose

  docker-scan:
    # Runs only on push/schedule events, never on pull_request.
    # PRs are covered by osv-scan on package lockfiles; container builds are expensive (~5-10 min/image).
    if: ${{ inputs.docker-images != '[]' && github.event_name != 'pull_request' }}
    name: Grype (${{ matrix.image.name }})
    runs-on: [self-hosted, linux, x64, skylabs]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(inputs.docker-images) }}
    steps:
      # Reusable workflows can't reference `secrets.*` directly inside a
      # step-level `if:` — it causes a startup failure. So we first dump
      # the secret presence into a step output, then gate subsequent
      # steps on that output.
      - name: Detect App Token availability
        id: has-app
        env:
          APP_ID: ${{ secrets.app-id }}
          PRIVATE_KEY: ${{ secrets.private-key }}
        run: |
          if [ -n "${APP_ID}" ] && [ -n "${PRIVATE_KEY}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      # When app-id + private-key are provided, generate an ephemeral
      # installation token and prefer it over the legacy npm-token secret.
      # This avoids shipping a long-lived PAT across repos.
      - name: Generate GitHub App Token (if configured)
        id: app-token
        if: steps.has-app.outputs.available == 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Resolve npm_token for Docker build
        id: npm
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.npm-token }}
        run: |
          # Prefer app-generated token (short-lived, scoped). Fall back to
          # the legacy static `npm-token` for backward compatibility with
          # callers that haven't migrated yet.
          if [ -n "${APP_TOKEN}" ]; then
            echo "source=app-token (ephemeral installation token)"
            echo "::add-mask::${APP_TOKEN}"
            echo "token=${APP_TOKEN}" >> $GITHUB_OUTPUT
          elif [ -n "${NPM_TOKEN}" ]; then
            echo "source=npm-token (legacy)"
            echo "::add-mask::${NPM_TOKEN}"
            echo "token=${NPM_TOKEN}" >> $GITHUB_OUTPUT
          else
            echo "source=none"
            echo "token=" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v3.11.1

      - name: Build image (local, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v6.18.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image.name }}:${{ github.sha }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          secrets: |
            npm_token=${{ steps.npm.outputs.token }}

      - name: Install Grype v0.111.1
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/v0.111.1/install.sh | sh -s -- -b /usr/local/bin v0.111.1
          grype version

      # Scan to JSON (non-blocking), then apply the same fixability policy as
      # the OSV gate: BLOCK only on FIXABLE findings >= grype-fail-on-severity;
      # unfixed CVEs and below-threshold findings are warnings. .grype.yaml
      # ignores are honoured (matched entries move to ignoredMatches).
      - name: Scan image (JSON, non-blocking)
        run: |
          set -euo pipefail
          CONFIG_FLAG=""
          if [ -f .grype.yaml ]; then
            echo "Using .grype.yaml from calling repo"
            CONFIG_FLAG="-c .grype.yaml"
          fi
          grype "${{ matrix.image.name }}:${{ github.sha }}" $CONFIG_FLAG -o json > grype-results.json || true

      - name: Gate on fixable findings
        env:
          FAIL_ON: ${{ inputs.grype-fail-on-severity }}
          IMAGE: ${{ matrix.image.name }}
        run: |
          set -euo pipefail
          cat > /tmp/grype-gate.cjs <<'GATE'
          const fs = require('fs');
          const FAIL_ON = (process.env.FAIL_ON || 'high').toLowerCase();
          const IMAGE = process.env.IMAGE || 'image';
          const RANK = { critical: 4, high: 3, medium: 2, low: 1, negligible: 0, unknown: 0 };
          const threshold = RANK[FAIL_ON] ?? 3;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const append = (s) => { if (summaryPath) fs.appendFileSync(summaryPath, s + '\n'); console.log(s); };

          let data;
          try { data = JSON.parse(fs.readFileSync('grype-results.json', 'utf8')); }
          catch (e) { console.log(`::warning title=Grype::Could not parse results for ${IMAGE} (${e.message}) — not blocking.`); process.exit(0); }

          const blocking = [], warnings = [];
          for (const m of data.matches || []) {
            const v = m.vulnerability || {}, a = m.artifact || {};
            const sev = (v.severity || 'unknown').toLowerCase();
            const fixable = (v.fix && v.fix.state) === 'fixed';
            const rec = { id: v.id, pkg: `${a.name}@${a.version}`, sev, fixable };
            (fixable && (RANK[sev] ?? 0) >= threshold ? blocking : warnings).push(rec);
          }
          const dedupe = (arr) => { const m = new Map(); for (const r of arr) m.set(`${r.id}|${r.pkg}`, r); return [...m.values()]; };
          const B = dedupe(blocking), W = dedupe(warnings);
          const ignored = (data.ignoredMatches || []).length;
          const table = (rows) => rows.length
            ? ['| ID | Package | Severity | Fix |', '|---|---|---|---|',
               ...rows.map(r => `| ${r.id} | ${r.pkg} | ${r.sev} | ${r.fixable ? 'available' : 'none yet'} |`)].join('\n')
            : '_none_';

          append(`## Grype — ${IMAGE}`);
          append(`Policy: block on **fixable** findings of severity **${FAIL_ON}+**; unfixed and below-threshold are warnings.${ignored ? ` (${ignored} ignored via .grype.yaml)` : ''}\n`);
          append(`- 🚫 Blocking (fixable, ≥ ${FAIL_ON}): **${B.length}**`);
          append(`- ⚠️ Warnings (unfixed, or below threshold): **${W.length}**\n`);
          if (B.length) { append(`### 🚫 Blocking`); append(table(B) + '\n'); }
          // Container images carry many low/negligible OS-package CVEs — cap the
          // warning table (and skip per-finding annotations) to avoid flooding.
          append(`### ⚠️ Warnings`); append(table(W.slice(0, 50)) + '\n');
          if (W.length > 50) append(`_…and ${W.length - 50} more warnings (full list in the Grype step log)._\n`);

          for (const r of B) console.log(`::error title=Grype ${r.id} (${r.sev}, fix available)::${r.pkg} in ${IMAGE} — rebuild with a patched base image / dependency`);
          if (B.length) { console.error(`\nBlocking: ${B.length} fixable ${FAIL_ON}+ vuln(s) in ${IMAGE}.`); process.exit(1); }
          console.log(`\nNo blocking findings in ${IMAGE}. ${W.length} warning(s) (non-blocking).`);
          GATE
          node /tmp/grype-gate.cjs
