name: Security Scan (reusable)
on:
  workflow_call:
    inputs:
      gitleaks-only:
        type: boolean
        default: false
      osv-scan-args:
        type: string
        default: |-
          --recursive
          ./
jobs:
  osv-scan:
    if: ${{ !inputs.gitleaks-only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: ${{ inputs.osv-scan-args }}
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - run: echo "hi"
