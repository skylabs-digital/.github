name: Security Scan (reusable)

on:
  workflow_call:
    inputs:
      docker-images:
        description: 'JSON array of images'
        type: string
        default: '[]'
      gitleaks-only:
        description: 'Only gitleaks'
        type: boolean
        default: false
      osv-scan-args:
        description: 'OSV args'
        type: string
        default: |-
          --recursive
          ./

permissions:
  contents: read

jobs:
  osv-scan:
    if: ${{ !inputs.gitleaks-only }}
    name: OSV-Scanner (deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.0
      - uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5  # v2.3.5
        with:
          scan-args: ${{ inputs.osv-scan-args }}

  secrets-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.0
        with:
          fetch-depth: 0
      - name: Install and scan
        run: |
          set -euo pipefail
          VERSION=8.30.1
          case "$(uname -m)" in
            x86_64) ASSET=gitleaks_${VERSION}_linux_x64.tar.gz; SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb ;;
            aarch64|arm64) ASSET=gitleaks_${VERSION}_linux_arm64.tar.gz; SHA256=e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080 ;;
            *) echo "Unsupported arch" >&2; exit 1 ;;
          esac
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ASSET}" -o gl.tgz
          echo "${SHA256}  gl.tgz" | sha256sum -c -
          tar -xzf gl.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks detect --source . --redact --exit-code 1 --verbose
