name: Security Scan (reusable)

# Reusable security workflow for Skylabs Digital repos.
# See README.md for usage and templates.
#
# Note: no `permissions:` block — permissions are inherited from the caller.
# Callers typically set `permissions: contents: read` at workflow level.

on:
  workflow_call:
    inputs:
      docker-images:
        description: 'JSON array of images to scan with Grype'
        type: string
        default: '[]'
      gitleaks-only:
        description: 'Skip OSV-Scanner (for non-Node repos)'
        type: boolean
        default: false
      osv-scan-args:
        description: 'Override OSV-Scanner scan-args'
        type: string
        default: |-
          --recursive
          ./
    secrets:
      npm-token:
        description: '[DEPRECATED — prefer app-id + private-key] Static token for private @skylabs-digital npm packages, injected as --mount=type=secret,id=npm_token during Docker builds.'
        required: false
      app-id:
        description: 'GitHub App ID (e.g. semantic-release-bot-skylabs). If provided together with private-key, the workflow generates an ephemeral installation token and uses it as npm_token for Docker builds. Takes precedence over npm-token.'
        required: false
      private-key:
        description: 'GitHub App private key matching app-id.'
        required: false

jobs:
  osv-scan:
    if: ${{ !inputs.gitleaks-only }}
    name: OSV-Scanner (deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.0

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5  # v2.3.5
        with:
          scan-args: ${{ inputs.osv-scan-args }}

  secrets-scan:
    name: Gitleaks (secrets in code + history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.0
        with:
          fetch-depth: 0

      - name: Install Gitleaks v8.30.1
        run: |
          set -euo pipefail
          VERSION=8.30.1
          case "$(uname -m)" in
            x86_64)
              ASSET=gitleaks_${VERSION}_linux_x64.tar.gz
              SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
              ;;
            aarch64|arm64)
              ASSET=gitleaks_${VERSION}_linux_arm64.tar.gz
              SHA256=e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080
              ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ASSET}" -o gitleaks.tgz
          echo "${SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repository (full history)
        run: gitleaks detect --source . --redact --exit-code 1 --verbose

  docker-scan:
    # Runs only on push/schedule events, never on pull_request.
    # PRs are covered by osv-scan on package lockfiles; container builds are expensive (~5-10 min/image).
    if: ${{ inputs.docker-images != '[]' && github.event_name != 'pull_request' }}
    name: Grype (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(inputs.docker-images) }}
    steps:
      # Reusable workflows can't reference `secrets.*` directly inside a
      # step-level `if:` — it causes a startup failure. So we first dump
      # the secret presence into a step output, then gate subsequent
      # steps on that output.
      - name: Detect App Token availability
        id: has-app
        env:
          APP_ID: ${{ secrets.app-id }}
          PRIVATE_KEY: ${{ secrets.private-key }}
        run: |
          if [ -n "${APP_ID}" ] && [ -n "${PRIVATE_KEY}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      # When app-id + private-key are provided, generate an ephemeral
      # installation token and prefer it over the legacy npm-token secret.
      # This avoids shipping a long-lived PAT across repos.
      - name: Generate GitHub App Token (if configured)
        id: app-token
        if: steps.has-app.outputs.available == 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Resolve npm_token for Docker build
        id: npm
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.npm-token }}
        run: |
          # Prefer app-generated token (short-lived, scoped). Fall back to
          # the legacy static `npm-token` for backward compatibility with
          # callers that haven't migrated yet.
          if [ -n "${APP_TOKEN}" ]; then
            echo "source=app-token (ephemeral installation token)"
            echo "::add-mask::${APP_TOKEN}"
            echo "token=${APP_TOKEN}" >> $GITHUB_OUTPUT
          elif [ -n "${NPM_TOKEN}" ]; then
            echo "source=npm-token (legacy)"
            echo "::add-mask::${NPM_TOKEN}"
            echo "token=${NPM_TOKEN}" >> $GITHUB_OUTPUT
          else
            echo "source=none"
            echo "token=" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v3.11.1

      - name: Build image (local, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v6.18.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image.name }}:${{ github.sha }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          secrets: |
            npm_token=${{ steps.npm.outputs.token }}

      - name: Install Grype v0.111.1
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/v0.111.1/install.sh | sh -s -- -b /usr/local/bin v0.111.1
          grype version

      - name: Scan image
        run: |
          set -euo pipefail
          CONFIG_FLAG=""
          if [ -f .grype.yaml ]; then
            echo "Using .grype.yaml from calling repo"
            CONFIG_FLAG="-c .grype.yaml"
          fi
          grype ${{ matrix.image.name }}:${{ github.sha }} $CONFIG_FLAG --fail-on high --only-fixed
