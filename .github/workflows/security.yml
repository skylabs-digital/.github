name: Security Scan (reusable)
on:
  workflow_call:
    inputs:
      docker-images:
        type: string
        default: '[]'
      gitleaks-only:
        type: boolean
        default: false
      osv-scan-args:
        type: string
        default: |-
          --recursive
          ./
permissions:
  contents: read
jobs:
  osv-scan:
    if: ${{ !inputs.gitleaks-only }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: ${{ inputs.osv-scan-args }}
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - run: echo "secrets"
  docker-scan:
    if: ${{ inputs.docker-images != '[]' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(inputs.docker-images) }}
    steps:
      - run: echo "docker"
