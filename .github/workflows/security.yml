name: Security Scan (reusable)
on:
  workflow_call:
    inputs:
      docker-images:
        type: string
        default: '[]'
      gitleaks-only:
        type: boolean
        default: false
jobs:
  osv-scan:
    if: ${{ !inputs.gitleaks-only }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "osv"
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - run: echo "secrets"
  docker-scan:
    if: ${{ inputs.docker-images != '[]' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(inputs.docker-images) }}
    steps:
      - run: echo "docker"
